<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード - Kusuri Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card {
            background: white;
            border-radius: 1rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="min-h-screen">
    <header class="glass-header sticky top-0 z-50 py-4 px-6 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-indigo-900"><i class="fas fa-user-shield mr-2"></i>管理者ダッシュボード</h1>
            <div id="auth-status" class="text-xs font-bold text-gray-500">認証済み</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-12">
        <div id="login-section" class="card p-8 max-w-md mx-auto mt-20">
            <h2 class="text-lg font-black text-gray-900 mb-4 text-center">管理者認証</h2>
            <input type="password" id="admin-pass-input" placeholder="管理者パスコード"
                class="w-full p-3 rounded-xl border border-gray-200 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button id="login-btn"
                class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">ログイン</button>
        </div>

        <div id="admin-section" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-gray-900">登録店舗一覧</h2>
                <div class="flex gap-2">
                    <button id="add-store-btn"
                        class="bg-indigo-600 text-white hover:bg-indigo-700 px-4 py-2 rounded-lg font-bold transition-all shadow-lg shadow-indigo-100 flex items-center">
                        <i class="fas fa-plus mr-2"></i>新規追加
                    </button>
                    <button id="refresh-btn"
                        class="text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-lg font-bold transition-all flex items-center">
                        <i class="fas fa-sync-alt mr-2"></i>更新
                    </button>
                </div>
            </div>

            <div class="card overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="p-4 font-black text-gray-500 uppercase tracking-widest text-[10px]">店舗ID / 名前
                            </th>
                            <th class="p-4 font-black text-gray-500 uppercase tracking-widest text-[10px]">プラン</th>
                            <th class="p-4 font-black text-gray-500 uppercase tracking-widest text-[10px]">監視上限</th>
                            <th class="p-4 font-black text-gray-500 uppercase tracking-widest text-[10px]">状態</th>
                            <th class="p-4 font-black text-gray-500 uppercase tracking-widest text-[10px]">登録日</th>
                            <th class="p-4 font-black text-gray-500 uppercase tracking-widest text-[10px]">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="store-list-body" class="divide-y divide-gray-50">
                        <!-- 店舗データがここに挿入される -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Update Modal -->
    <div id="update-modal"
        class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black bg-opacity-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
            <h3 class="text-xl font-black text-gray-900 mb-6" id="modal-title">店舗情報の編集</h3>
            <input type="hidden" id="edit-mode" value="edit"> <!-- 'edit' or 'add' -->

            <div class="space-y-4">
                <div id="store-id-container">
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">店舗ID</label>
                    <input type="text" id="edit-store-id" placeholder="例: pharmacy-001"
                        class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">店舗名</label>
                    <input type="text" id="edit-store-name" placeholder="例: テスト薬局"
                        class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                </div>
                <div id="passcode-container">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">パスコード
                        (新規追加時のみ)</label>
                    <input type="password" id="edit-passcode" placeholder="初期パスコードを設定"
                        class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">プラン</label>
                    <select id="edit-plan"
                        class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                        <option value="free">Free Plan</option>
                        <option value="standard">Standard Plan</option>
                    </select>
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">監視上限数</label>
                    <input type="number" id="edit-limit"
                        class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">契約状態</label>
                    <select id="edit-status"
                        class="w-full p-3 rounded-xl border border-gray-100 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                        <option value="active">Active (有効)</option>
                        <option value="trialing">Trialing (試用中)</option>
                        <option value="past_due">Past Due (未払い)</option>
                        <option value="canceled">Canceled (解約済み)</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button id="modal-cancel-btn"
                    class="flex-1 px-4 py-3 rounded-xl font-black text-gray-500 hover:bg-gray-100 transition-all">キャンセル</button>
                <button id="modal-save-btn"
                    class="flex-1 px-4 py-3 rounded-xl font-black bg-indigo-600 text-white hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">保存</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin-script.ts"></script>
</body>

</html>
