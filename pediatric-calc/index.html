<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小児薬用量計算機 - Kusuri Compass</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H44R8N7W32"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-H44R8N7W32');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/v2-shared.css">
    <link rel="stylesheet" href="../css/v2.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main-header base-dir="../" active-page=""></main-header>

    <!-- Floating Notification Container -->
    <div id="notification-container"
        style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none;">
    </div>

    <!-- Patient Info Bar (Top Stack) -->
    <div class="patient-info-bar">
        <div class="input-container">
            <div class="inputs-wrapper">
                <!-- PC Inputs -->
                <div class="age-inputs pc-only">
                    <div class="input-group-enhanced">
                        <div class="input-icon"><i class="fas fa-cake-candles"></i></div>
                        <input type="number" id="age-input" placeholder="000" inputmode="numeric" min="0" max="999">
                        <div class="input-unit">歳</div>
                    </div>
                    <div class="input-group-enhanced">
                        <input type="number" id="month-input" placeholder="0" inputmode="numeric" min="0" max="11">
                        <div class="input-unit">ヶ月</div>
                    </div>
                </div>
                <div class="input-group-enhanced pc-only">
                    <div class="input-icon"><i class="fas fa-weight-scale"></i></div>
                    <input type="number" id="weight-input" placeholder="10" value="10" inputmode="numeric" step="1">
                    <div class="input-unit">kg</div>
                </div>

                <!-- Mobile Dial Trigger -->
                <div class="dial-container mobile-only" id="age-dial-trigger">
                    <div class="dial-value" id="age-val-display">0</div>
                    <div class="dial-label">歳</div>
                    <div class="dial-value" id="month-val-display">0</div>
                    <div class="dial-label">ヶ月</div>
                </div>

                <div class="dial-container mobile-only" id="weight-dial-trigger">
                    <div class="dial-value" id="weight-val-display">10</div>
                    <div class="dial-label">kg</div>
                </div>

                <!-- Auto Weight Button -->
                <button class="helper-btn" id="auto-weight-btn" title="標準体重を入力">
                    <i class="fas fa-calculator" style="font-size: 0.8rem; margin-bottom: 2px;"></i>
                    <div style="font-size: 0.55rem; font-weight: bold;">標準体重</div>
                </button>
            </div>

            <!-- Trash Button -->
            <button id="close-sheet" title="入力をすべて削除">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </div>

    <!-- Dial Picker Overlay -->
    <div class="dial-overlay" id="dial-overlay">
        <div class="dial-modal">
            <div class="dial-modal-title" id="dial-title">年齢を選択</div>
            <div class="dial-wheels-container" id="dial-wheels">
                <div class="dial-wheel-wrapper">
                    <div class="dial-wheel-highlight"></div>
                    <div class="dial-wheel" id="wheel-left"></div>
                    <div class="dial-wheel-mask"></div>
                    <div style="font-size: 0.7rem; color: #64748b; margin-top: 4px;" id="label-left">歳</div>
                </div>
                <div class="dial-wheel-wrapper">
                    <div class="dial-wheel-highlight"></div>
                    <div class="dial-wheel" id="wheel-right"></div>
                    <div class="dial-wheel-mask"></div>
                    <div style="font-size: 0.7rem; color: #64748b; margin-top: 4px;" id="label-right">ヶ月</div>
                </div>
            </div>
            <button class="dial-confirm-btn" id="dial-confirm">決定</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Prescription Sheet -->
        <div class="prescription-sheet" id="prescription-sheet">
            <div class="sheet-content" id="sheet-content">
                <div class="empty-rx-container">
                    <i class="fas fa-hand-pointer empty-rx-icon"></i>
                    <p>薬剤を選択してください</p>
                </div>
            </div>
        </div>

        <!-- Library Area -->
        <div class="library-area">
            <div class="search-area">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="drug-search" placeholder="薬剤名またはYJコードで検索...">
                </div>
                <div class="category-tabs" id="category-tabs"></div>
            </div>

            <div id="drug-grid" class="drug-grid"></div>
        </div>
    </div>

    <!-- Dosage Modal -->
    <div id="dosage-modal" class="dial-overlay">
        <div class="dial-modal" style="max-width: 500px; text-align: left;">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
                <h3 id="dosage-modal-title" style="margin:0;">添付文書情報</h3>
                <button id="close-dosage-modal" style="background:none; border:none; cursor:pointer;"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="dosage-modal-source"
                style="font-size:0.8rem; color:#64748b; margin-bottom:1rem; font-weight:bold;"></div>
            <div id="dosage-modal-body" style="max-height: 60vh; overflow-y: auto; padding-right: 0.5rem;">
                <div style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> 読み込み中...</div>
            </div>
            <button class="dial-confirm-btn" style="margin-top:1.5rem;"
                onclick="document.getElementById('dosage-modal').style.display='none'">閉じる</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="../js/components/MainHeader.js"></script>
    <script type="module" src="calc.js"></script>

    <!-- Disclaimer Banner -->
    <div id="disclaimer-banner" class="disclaimer-banner">
        <button class="disclaimer-close" id="disclaimer-close" title="閉じる">&times;</button>
        <div class="disclaimer-content">
            <h4>制限事項 / 特記事項</h4>
            <p><strong>免責事項:</strong> 本アプリケーションは医療従事者向けの計算「補助」ツールです。最終的な判断は各専門家の責任で行ってください。</p>
            <p><strong>データ保証:</strong> 薬剤データは添付文書に基づき精査していますが、使用時は必ず一次文書をご確認ください。</p>
            <label class="disclaimer-never-show">
                <input type="checkbox" id="disclaimer-never-show-check"> 再表示しない
            </label>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const banner = document.getElementById('disclaimer-banner');
            const closeBtn = document.getElementById('disclaimer-close');
            const neverShowCheck = document.getElementById('disclaimer-never-show-check');
            if (!localStorage.getItem('pedCalcDisclaimerHidden')) {
                setTimeout(() => banner.classList.add('show'), 800);
            }
            closeBtn.addEventListener('click', () => {
                banner.classList.remove('show');
                if (neverShowCheck.checked) localStorage.setItem('pedCalcDisclaimerHidden', 'true');
            });
        });
    </script>
</body>

</html>
