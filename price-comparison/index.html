<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬価比較ツール | Kusuri Compass</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-slate-50 text-slate-900 font-sans leading-relaxed">
    <main-header></main-header>

    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full max-w-7xl transition-all duration-500">
        <!-- Dashboard Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 mb-2">薬価比較ツール (2025 → 2026)</h1>
                <p class="text-slate-600">YJコードまたはレセプト電算コードを貼り付けて、価格変動と供給状況を一括チェック。</p>
            </div>
            <div id="dataTime" class="text-xs text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-100">
                データ更新日: --</div>
        </div>

        <!-- Search Area -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 flex flex-col gap-4">
                    <div>
                        <label for="drugNameInput"
                            class="block text-sm font-semibold text-slate-700 mb-2">医薬品名検索</label>
                        <div class="relative">
                            <input type="text" id="drugNameInput" placeholder="品名の一部を入力...（空欄で全件表示）"
                                class="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium p-3 pl-10">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label for="codeInput" class="block text-sm font-semibold text-slate-700">コード一覧 (YJ または
                                レセプト電算)</label>
                            <span
                                class="text-[10px] text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full border border-slate-200">最大3000件</span>
                        </div>
                        <textarea id="codeInput" rows="4"
                            class="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-mono p-4"
                            placeholder="コードを1行ずつ貼り付けてください...（空欄で全件表示）"></textarea>
                        <div class="mt-2 flex items-center justify-between text-xs text-slate-500">
                            <span id="codeCount">0 件の入力</span>
                            <button id="clearBtn"
                                class="text-indigo-600 hover:text-indigo-800 font-medium">条件クリア</button>
                        </div>
                    </div>
                </div>
                <div class="md:w-64 flex flex-col justify-center gap-3">
                    <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 mb-2">
                        <ul class="text-[10px] text-indigo-800 space-y-1.5 list-disc list-inside">
                            <li><span class="font-bold">コード・名称ともに未記入</span>で全件表示。</li>
                            <li>全件表示時は結果の読み込みに<span class="text-rose-600 font-bold">時間がかかります</span>。</li>
                            <li>名称はスペース区切りで<span class="font-bold">AND検索</span>が可能。</li>
                        </ul>
                    </div>
                    <button id="searchBtn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 transform active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        比較実行
                    </button>
                    <div class="text-center text-[10px] text-slate-400 leading-tight">
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Sort Buttons -->
        <div id="sortControls" class="mb-6 hidden flex flex-wrap gap-2 items-center">
            <span class="text-sm font-bold text-slate-500 mr-2 uppercase tracking-wider">Quick Sort:</span>
            <button id="sortPriceUp"
                class="px-4 py-2 rounded-full bg-rose-50 text-rose-700 border border-rose-100 text-sm font-bold hover:bg-rose-100 transition-colors flex items-center gap-1">
                値上がり(金額) <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                </svg>
            </button>
            <button id="sortRatioUp"
                class="px-4 py-2 rounded-full bg-rose-50 text-rose-700 border border-rose-100 text-sm font-bold hover:bg-rose-100 transition-colors flex items-center gap-1">
                値上がり(率) <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                </svg>
            </button>
            <div class="w-px h-6 bg-slate-200 mx-2"></div>
            <button id="sortPriceDown"
                class="px-4 py-2 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100 text-sm font-bold hover:bg-emerald-100 transition-colors flex items-center gap-1">
                値下がり(金額) <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            <button id="sortRatioDown"
                class="px-4 py-2 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100 text-sm font-bold hover:bg-emerald-100 transition-colors flex items-center gap-1">
                値下がり(率) <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
        </div>

        <!-- Result Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-fixed min-w-[1000px]">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="w-[50px] px-4 py-4 text-xs font-bold text-slate-500 uppercase">#</th>
                            <th class="px-4 py-4 text-xs font-bold text-slate-500 uppercase">医薬品名 / コード</th>
                            <th class="w-[110px] px-4 py-4 text-xs font-bold text-slate-500 uppercase text-right">
                                旧薬価(25)</th>
                            <th class="w-[110px] px-4 py-4 text-xs font-bold text-slate-500 uppercase text-right">
                                新薬価(26)</th>
                            <th class="w-[140px] px-4 py-4 text-xs font-bold text-slate-500 uppercase text-right">差額 /
                                変動率</th>
                            <th class="w-[160px] px-4 py-4 text-xs font-bold text-slate-500 uppercase text-center">供給状況
                            </th>
                            <th class="w-[220px] px-4 py-4 text-xs font-bold text-slate-500 uppercase">供給バランス(同規品)</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="7" class="px-4 py-24 text-center">
                                <div class="flex flex-col items-center">
                                    <svg class="w-12 h-12 text-slate-200 mb-4" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                        </path>
                                    </svg>
                                    <p class="text-slate-400">比較するコードを貼り付けて「比較実行」を押してください。</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <main-footer></main-footer>

    <!-- UI Components for JS cloning -->
    <template id="barGraphTemplate">
        <div class="flex flex-col gap-1 w-full">
            <div class="flex h-3 w-full rounded-full overflow-hidden bg-slate-100">
                <div class="bar-normal bg-blue-500 transition-all duration-500"></div>
                <div class="bar-limited bg-amber-400 transition-all duration-500"></div>
                <div class="bar-stopped bg-rose-500 transition-all duration-500"></div>
            </div>
            <div class="flex justify-between text-[9px] text-slate-400 font-mono leading-none">
                <span class="label-normal">通:0</span>
                <span class="label-limited">限:0</span>
                <span class="label-stopped">停:0</span>
            </div>
        </div>
    </template>

    <div id="loadingOverlay"
        class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <div class="mt-4 text-slate-800 font-bold tracking-widest uppercase text-xs">Processing Data</div>
    </div>

    <script type="module" src="./script.ts"></script>
</body>

</html>
